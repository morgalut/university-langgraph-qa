services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: university
      POSTGRES_PASSWORD: university
      POSTGRES_DB: university_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./university_langgraph_qa/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./university_langgraph_qa/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U university -d university_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./university_langgraph_qa
    env_file:
      - ./university_langgraph_qa/.env
    environment:
      DATABASE_URL: postgresql+psycopg://university:university@postgres:5432/university_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./university_langgraph_qa:/app

  frontend:
    build: ./university_qa_frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata: