<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5f7fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- SEO / sharing -->
    <title>University QA Agent</title>
    <meta name="description" content="Ask natural-language questions about the university database. Inspect generated SQL, review rows, and debug the full agent execution trace." />
    <meta name="robots" content="noindex" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="University QA Agent" />
    <meta property="og:description" content="Natural-language SQL agent over a PostgreSQL university database, powered by FastAPI + LangGraph." />
    <meta name="twitter:card" content="summary" />

    <!-- Favicon (inline SVG, no extra request) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M9 11h14M9 16h14M9 21h9' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E"
    />

    <!-- Fonts: preconnect for fastest swap, then load Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Pre-hydration paint: avoid flash of unstyled background -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f5f7fb;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Splash shown until React mounts. Removed when #root has children. */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse 80% 60% at 20% 0%, rgba(99, 102, 241, 0.08), transparent 60%),
          radial-gradient(ellipse 60% 50% at 100% 100%, rgba(139, 92, 246, 0.06), transparent 60%),
          #f5f7fb;
        z-index: 9999;
      }

      #initial-loader .badge {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        box-shadow: 0 12px 32px -8px rgba(99, 102, 241, 0.5);
        display: grid;
        place-items: center;
        animation: pulse 1.6s ease-in-out infinite;
      }

      #initial-loader svg {
        width: 28px;
        height: 28px;
        color: white;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.06); opacity: 0.85; }
      }

      /* Hide loader once React renders into #root */
      #root:not(:empty) ~ #initial-loader { display: none; }

      @media (prefers-reduced-motion: reduce) {
        #initial-loader .badge { animation: none; }
      }

      /* noscript fallback */
      .no-js-message {
        max-width: 28rem;
        margin: 4rem auto;
        padding: 1.5rem;
        border-radius: 16px;
        background: white;
        border: 1px solid #e2e8f0;
        text-align: center;
        font-size: 0.9rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="initial-loader" aria-hidden="true">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
          <path d="M3 5v14a9 3 0 0 0 18 0V5"></path>
          <path d="M3 12a9 3 0 0 0 18 0"></path>
        </svg>
      </div>
    </div>

    <noscript>
      <div class="no-js-message">
        <strong>JavaScript is required.</strong>
        <p>This app needs JavaScript enabled to run. Please enable it and reload the page.</p>
      </div>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
